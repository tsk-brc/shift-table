{% extends "shift/base.html" %}

{% block title %}パスワードリセットメール送信完了{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">メール送信完了</h3>
                </div>
                <div class="card-body text-center">
                    <div class="mb-4">
                        <i class="fas fa-envelope-open-text text-success" style="font-size: 3rem;"></i>
                    </div>
                    
                    <h5 class="mb-3">パスワードリセットメールを送信しました</h5>
                    
                    <p class="text-muted mb-4">
                        入力されたメールアドレスにパスワードリセット用のリンクを送信しました。
                        メールをご確認いただき、リンクをクリックしてパスワードを再設定してください。
                    </p>
                    
                    <div class="alert alert-info">
                        <small>
                            <strong>注意:</strong> メールが届かない場合は、迷惑メールフォルダもご確認ください。
                        </small>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <a href="{% url 'admin:login' %}" class="btn btn-primary">
                            管理画面に戻る
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .btn-primary {
        background-color: #0d6efd;
        border-color: #0d6efd;
        padding: 0.75rem;
        font-weight: 500;
    }
    
    .btn-primary:hover {
        background-color: #0b5ed7;
        border-color: #0a58ca;
    }
    
    .text-success {
        color: #198754 !important;
    }
</style>
{% endblock %}
