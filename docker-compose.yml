version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: shift_db
      POSTGRES_USER: shift_user
      POSTGRES_PASSWORD: shift_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DJANGO_DB_HOST=db
      - DJANGO_DB_NAME=shift_db
      - DJANGO_DB_USER=shift_user
      - DJANGO_DB_PASSWORD=shift_pass
volumes:
  postgres_data:
