<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直接パスワード変更</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">直接パスワード変更</h3>
                </div>
                <div class="card-body">
                    <p class="text-muted mb-4">
                        ユーザー名と新しいパスワードを入力して、パスワードを直接変更できます。
                    </p>
                    
                    {% if error %}
                    <div class="alert alert-danger">
                        {{ error }}
                    </div>
                    {% endif %}
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="form-group mb-3">
                            <label for="username">ユーザー名</label>
                            <input type="text" class="form-control" id="username" name="username" 
                                   value="{{ request.POST.username }}" required>
                        </div>
                        
                        <div class="form-group mb-3">
                            <label for="new_password">新しいパスワード</label>
                            <input type="password" class="form-control" id="new_password" name="new_password" required>
                            <div class="form-text">8文字以上で入力してください。</div>
                        </div>
                        
                        <div class="form-group mb-3">
                            <label for="confirm_password">新しいパスワード（確認）</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                パスワードを変更
                            </button>
                        </div>
                    </form>
                    
                    <div class="text-center mt-3">
                        <a href="{% url 'admin:login' %}" class="text-decoration-none">
                            ← 管理画面に戻る
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .form-control {
        border-radius: 0.375rem;
        border: 1px solid #ced4da;
        padding: 0.75rem;
    }
    
    .form-control:focus {
        border-color: #86b7fe;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
    }
    
    .btn-primary {
        background-color: #0d6efd;
        border-color: #0d6efd;
        padding: 0.75rem;
        font-weight: 500;
    }
    
    .btn-primary:hover {
        background-color: #0b5ed7;
        border-color: #0a58ca;
    }
    
    .form-text {
        font-size: 0.875rem;
        color: #6c757d;
    }
</style>
</body>
</html>
