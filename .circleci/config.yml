version: 2.1

orbs:
  python: circleci/python@2.1

jobs:
  test:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install base dependencies
          command: |
            pip install -r requirements.txt
      - run:
          name: Install test dependencies
          command: |
            pip install pytest pytest-django pytest-cov factory-boy coverage
      - run:
          name: Install system dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y postgresql-client
      - run:
          name: Run Django tests
          command: |
            python manage.py test --settings=shift_table.settings_test
      - run:
          name: Run tests with coverage
          command: |
            DJANGO_SETTINGS_MODULE=shift_table.settings_test pytest shift/test_files/ --cov=shift --cov=shift_table --cov-report=xml --cov-report=html
      - store_artifacts:
          path: htmlcov
          destination: coverage

  lint:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install base dependencies
          command: |
            pip install -r requirements.txt
      - run:
          name: Install linting dependencies
          command: |
            pip install flake8 black isort
      - run:
          name: Run linting
          command: |
            flake8 shift/ shift_table/ --max-line-length=120 --ignore=E501,W503 || echo "Linting completed"
            black --check shift/ shift_table/ || echo "Black check completed"

  security:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install base dependencies
          command: |
            pip install -r requirements.txt
      - run:
          name: Install security tools
          command: |
            pip install bandit safety
      - run:
          name: Run security checks
          command: |
            bandit -r shift/ shift_table/ -f json -o bandit-report.json || echo "Security check completed"
            safety check --json --output safety-report.json || echo "Safety check completed"

  build:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Build Docker image
          command: |
            docker build -t shift-table .
      - run:
          name: Test Docker image
          command: |
            docker run --rm shift-table python manage.py check

workflows:
  version: 2
  test-and-deploy:
    jobs:
      - lint
      - test:
          requires:
            - lint
      - security:
          requires:
            - lint
      - build:
          requires:
            - test
            - security
          filters:
            branches:
              only: main 