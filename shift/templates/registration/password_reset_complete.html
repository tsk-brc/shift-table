{% extends "shift/base.html" %}

{% block title %}パスワード変更完了{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">パスワード変更完了</h3>
                </div>
                <div class="card-body text-center">
                    <div class="mb-4">
                        <i class="fas fa-check-circle text-success" style="font-size: 3rem;"></i>
                    </div>
                    
                    <h5 class="mb-3">パスワードが正常に変更されました</h5>
                    
                    <p class="text-muted mb-4">
                        新しいパスワードでログインできるようになりました。
                        セキュリティのため、新しいパスワードを安全に管理してください。
                    </p>
                    
                    <div class="d-grid gap-2">
                        <a href="{% url 'admin:login' %}" class="btn btn-primary">
                            管理画面にログイン
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .btn-primary {
        background-color: #0d6efd;
        border-color: #0d6efd;
        padding: 0.75rem;
        font-weight: 500;
    }
    
    .btn-primary:hover {
        background-color: #0b5ed7;
        border-color: #0a58ca;
    }
    
    .text-success {
        color: #198754 !important;
    }
</style>
{% endblock %}
