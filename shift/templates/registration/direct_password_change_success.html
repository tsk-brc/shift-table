<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード変更完了</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">パスワード変更完了</h3>
                </div>
                <div class="card-body text-center">
                    <div class="mb-4">
                        <i class="fas fa-check-circle text-success" style="font-size: 3rem;"></i>
                    </div>
                    
                    <h5 class="mb-3">パスワードが正常に変更されました</h5>
                    
                    <p class="text-muted mb-4">
                        ユーザー「<strong>{{ username }}</strong>」のパスワードが正常に変更されました。
                        新しいパスワードでログインできるようになりました。
                    </p>
                    
                    <div class="alert alert-info">
                        <small>
                            <strong>注意:</strong> セキュリティのため、新しいパスワードを安全に管理してください。
                        </small>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <a href="{% url 'admin:login' %}" class="btn btn-primary">
                            管理画面にログイン
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .btn-primary {
        background-color: #0d6efd;
        border-color: #0d6efd;
        padding: 0.75rem;
        font-weight: 500;
    }
    
    .btn-primary:hover {
        background-color: #0b5ed7;
        border-color: #0a58ca;
    }
    
    .text-success {
        color: #198754 !important;
    }
</style>
</body>
</html>
